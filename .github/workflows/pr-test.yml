name: PR Test

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          shellcheck install-scripts/*.sh config/tmux/scripts/*.sh scripts/*

      - name: Fish syntax check
        run: |
          sudo apt-get update && sudo apt-get install -y fish
          for f in config/fish/*.fish install-scripts/*.fish; do
            fish --no-execute "$f"
          done

  test:
    strategy:
      matrix:
        distro:
          - alpine
          - archlinux
          - fedora
          - ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Only build
        run: |
          docker buildx build --platform linux/amd64 --output "type=image,push=false" -f tests/Dockerfile-${{ matrix.distro }} .